<script>
// Ambient particle canvas
(function(){
  const c=document.getElementById('bg');
  const ctx=c.getContext('2d');
  let w,h,pts=[];
  function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;pts=Array.from({length:38},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*0.18,vy:(Math.random()-.5)*0.18,r:Math.random()*1.4+0.4,a:Math.random()}));}
  window.addEventListener('resize',resize);resize();
  function draw(){
    ctx.clearRect(0,0,w,h);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(167,139,250,${0.12+p.a*0.12})`;ctx.fill();
    });
    // faint lines between close points
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      const d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);
      if(d<90){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(167,139,250,${0.04*(1-d/90)})`;ctx.lineWidth=0.6;ctx.stroke();}
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

// ─── AUTH ─────────────────────────────────────────────────────────────────────
const USERS_KEY = 'nh_users';

function getUsers(){ try{return JSON.parse(localStorage.getItem(USERS_KEY)||'[]');}catch{return[];} }
function saveUsers(u){ localStorage.setItem(USERS_KEY, JSON.stringify(u)); }

function registerUser(name, email, password, role){
  const users = getUsers();
  if(users.find(u=>u.email===email)) return {error:'Email already registered.'};
  const user = {id:Date.now().toString(), name:name||'Explorer', email, password:btoa(password), role, createdAt:new Date().toISOString()};
  users.push(user);
  saveUsers(users);
  return {user};
}

function loginUser(email, password){
  const users = getUsers();
  const user = users.find(u=>u.email===email && u.password===btoa(password));
  if(!user) return {error:'Invalid email or password.'};
  return {user};
}

function signOut(){
  S.set('nh_profile', null);
  localStorage.removeItem('nh_profile');
}

async function requestNotifications(){
  try{
    const permission = await Notification.requestPermission();
    return permission === 'granted';
  }catch(e){return false;}
}

function sendNotification(title, body){
  if(Notification.permission === 'granted'){
    new Notification(title, {body, icon: '/favicon.ico'});
  }
}

function AILogo({domain,name,color,size=48}){
  const [stage,setStage]=useState(0);
  const srcs=[`https://logo.clearbit.com/${domain}`,`https://www.google.com/s2/favicons?domain=${domain}&sz=256`];
  if(stage>=2)return <div style={{width:size,height:size,borderRadius:size*0.22,background:`${color}22`,border:`1px solid ${color}55`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.34,fontWeight:700,color,flexShrink:0}}>{name.slice(0,2).toUpperCase()}</div>;
  return <img src={srcs[stage]} onError={()=>setStage(s=>s+1)} style={{width:size,height:size,borderRadius:stage===1?size*0.18:size*0.22,objectFit:'contain',background:stage===1?'transparent':'#fff',padding:stage===1?0:size*0.1,flexShrink:0}} alt={name}/>;
}

// ─── AI SEARCH BAR ────────────────────────────────────────────────────────────
function AISearchBar({onSelect,placeholder='Search AI...',big=false}){
  const [q,setQ]=useState('');
  const [open,setOpen]=useState(false);
  const ref=useRef();
  const results=useMemo(()=>q.length>0?ALL_AIS.filter(a=>a.name.toLowerCase().includes(q.toLowerCase())||a.desc.toLowerCase().includes(q.toLowerCase())||a.category.toLowerCase().includes(q.toLowerCase())).slice(0,8):[],[q]);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);},[]);
  return(
    <div ref={ref} style={{position:'relative',width:'100%'}}>
      <div style={{position:'relative'}}>
        <span style={{position:'absolute',left:big?16:11,top:'50%',transform:'translateY(-50%)',color:'var(--muted)',fontSize:big?16:12,pointerEvents:'none'}}>⌕</span>
        <input value={q} onChange={e=>{setQ(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)}
          placeholder={placeholder}
          style={{width:'100%',background:'var(--surface2)',border:`1px solid ${open&&q?'var(--accent)':'var(--border)'}`,borderRadius:big?14:9,padding:big?'13px 16px 13px 44px':'9px 12px 9px 32px',color:'#fff',fontSize:big?15:12,fontFamily:'Space Grotesk',outline:'none',transition:'border-color 0.2s'}}/>
        {q&&<button onClick={()=>{setQ('');setOpen(false);}} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'transparent',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:15}}>×</button>}
      </div>
      {open&&results.length>0&&(
        <div style={{position:'absolute',top:'calc(100% + 5px)',left:0,right:0,zIndex:300,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:11,overflow:'hidden',boxShadow:'0 16px 48px rgba(0,0,0,0.55)'}}>
          {results.map(ai=>(
            <div key={ai.id+ai.catId} onClick={()=>{setQ('');setOpen(false);onSelect(ai);}}
              style={{padding:'9px 13px',cursor:'pointer',display:'flex',alignItems:'center',gap:11,transition:'background 0.12s',borderBottom:'1px solid rgba(255,255,255,0.04)'}}
              onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <AILogo domain={ai.domain} name={ai.name} color={ai.color} size={46}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:13,color:'#fff'}}>{ai.name}</div>
                <div style={{fontSize:10,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ai.category} · {ai.desc}</div>
              </div>
              {ai.isNew&&<span style={{fontSize:8,padding:'2px 6px',borderRadius:20,fontWeight:700,background:'rgba(52,211,153,0.2)',color:'#34d399',border:'1px solid rgba(52,211,153,0.4)',flexShrink:0}}>NEW</span>}
              <span style={{fontSize:8,padding:'2px 6px',borderRadius:20,fontWeight:700,background:`${TIER_COLORS[ai.tier]}18`,color:TIER_COLORS[ai.tier],border:`1px solid ${TIER_COLORS[ai.tier]}35`,flexShrink:0}}>{ai.tier.toUpperCase()}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── WORKSPACE ────────────────────────────────────────────────────────────────
function WorkspaceScreen({ai,category,onBack}){
  const [projects,setProjects]=useState(getProjects().filter(p=>p.aiId===ai.id));
  const [noteInput,setNoteInput]=useState('');
  const [tab,setTab]=useState('projects');
  const [iframeError,setIframeError]=useState(false);
  const [exportMsg,setExportMsg]=useState('');
  const refresh=()=>setProjects(getProjects().filter(p=>p.aiId===ai.id));
  const saveNote=()=>{if(!noteInput.trim())return;addProject(ai.id,ai.name,noteInput.trim());setNoteInput('');refresh();};
  const dl=(t,n,m)=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type:m}));a.download=n;a.click();};
  const handleExport=fmt=>{
    const proj=getProjects().filter(p=>p.aiId===ai.id);
    if(fmt==='txt')dl(proj.map(p=>`[${p.date}] ${p.note}`).join('\n'),`${ai.name}.txt`,'text/plain');
    else if(fmt==='json')dl(JSON.stringify(proj,null,2),`${ai.name}.json`,'application/json');
    else if(fmt==='csv')dl(['Date,AI,Note',...proj.map(p=>`${p.date},${p.aiName},"${p.note}"`)].join('\n'),`${ai.name}.csv`,'text/csv');
    else{window.print();return;}
    setExportMsg(`Exported as ${fmt.toUpperCase()}`);setTimeout(()=>setExportMsg(''),2500);
  };
  return(
    <div style={{flex:1,display:'flex',overflow:'hidden'}}>
      <div style={{flex:1,width:0,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'8px 14px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:9,background:'var(--surface)',flexShrink:0}}>
          <button onClick={onBack} style={{background:'transparent',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:16}}>←</button>
          <AILogo domain={ai.domain} name={ai.name} color={category.color} size={22}/>
          <span style={{fontWeight:600,fontSize:13,color:'#fff'}}>{ai.name}</span>
          <div style={{flex:1}}/>
          <a href={ai.url} target="_blank" rel="noopener" style={{fontSize:11,color:'var(--accent)',textDecoration:'none',border:'1px solid var(--border)',borderRadius:6,padding:'4px 10px',background:'var(--surface2)'}}>Open in tab ↗</a>
        </div>
        <div style={{flex:1,position:'relative',background:'#000'}}>
          {iframeError?(
            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:13,padding:32}}>
              <AILogo domain={ai.domain} name={ai.name} color={category.color} size={64}/>
              <div style={{textAlign:'center'}}>
                <div style={{fontWeight:600,fontSize:15,marginBottom:6,color:'#fff'}}>{ai.name} blocks embedding</div>
                <div style={{color:'var(--muted)',fontSize:12,marginBottom:16,maxWidth:280}}>Open in a new tab to use it — your notes are saved here.</div>
                <a href={ai.url} target="_blank" rel="noopener" style={{display:'inline-block',background:'var(--accent2)',color:'#fff',padding:'10px 20px',borderRadius:9,textDecoration:'none',fontWeight:600,fontSize:13}}>Open {ai.name} →</a>
              </div>
            </div>
          ):(
            <iframe src={ai.url} onError={()=>setIframeError(true)} onLoad={e=>{try{if(!e.target.contentDocument)setIframeError(true);}catch{setIframeError(true);}}} style={{width:'100%',height:'100%',border:'none'}} sandbox="allow-scripts allow-same-origin allow-forms allow-popups" title={ai.name}/>
          )}
        </div>
      </div>
      <div style={{width:260,borderLeft:'1px solid var(--border)',background:'var(--surface)',display:'flex',flexDirection:'column'}}>
        <div style={{display:'flex',borderBottom:'1px solid var(--border)'}}>
          {['projects','export'].map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:'9px',background:'transparent',border:'none',color:tab===t?'var(--accent)':'var(--muted)',borderBottom:tab===t?'2px solid var(--accent)':'2px solid transparent',cursor:'pointer',fontSize:11,fontFamily:'Space Grotesk',fontWeight:500,textTransform:'capitalize'}}>
              {t==='projects'?'◈ Notes':'↗ Export'}
            </button>
          ))}
        </div>
        {tab==='projects'&&(
          <div style={{flex:1,width:0,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <div style={{padding:'10px 11px',borderBottom:'1px solid var(--border)'}}>
              <textarea value={noteInput} onChange={e=>setNoteInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveNote();}}} placeholder="Save a note... (Enter to save)" rows={3} style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:7,padding:'8px',color:'#fff',fontSize:11,fontFamily:'Space Grotesk',resize:'none',outline:'none'}}/>
              <button onClick={saveNote} style={{marginTop:5,width:'100%',background:'var(--accent2)',border:'none',color:'#fff',padding:'7px',borderRadius:7,cursor:'pointer',fontSize:11,fontFamily:'Space Grotesk',fontWeight:500}}>Save Note</button>
            </div>
            <div style={{flex:1,overflowY:'auto'}}>
              {projects.length===0?<div style={{padding:16,textAlign:'center',color:'var(--muted)',fontSize:11}}>No notes yet.</div>
              :projects.map(p=>(
                <div key={p.id} style={{padding:'8px 11px',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                  <div style={{fontSize:9,color:'var(--muted)',marginBottom:2}}>{p.date}</div>
                  <div style={{fontSize:11,lineHeight:1.5,color:'#fff'}}>{p.note}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        {tab==='export'&&(
          <div style={{padding:11,display:'flex',flexDirection:'column',gap:7}}>
            {exportMsg&&<div style={{padding:'6px 9px',background:'rgba(167,139,250,0.15)',borderRadius:7,fontSize:11,color:'var(--accent)',textAlign:'center'}}>{exportMsg}</div>}
            {[{fmt:'txt',label:'Plain Text .txt'},{fmt:'json',label:'JSON Data .json'},{fmt:'csv',label:'Spreadsheet .csv'},{fmt:'pdf',label:'Print / PDF'}].map(({fmt,label})=>(
              <button key={fmt} onClick={()=>handleExport(fmt)} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 12px',cursor:'pointer',color:'#fff',fontFamily:'Space Grotesk',fontSize:12,textAlign:'left',transition:'all 0.2s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.color='var(--accent)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='#fff';}}>{label}</button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

          {history.map((h,i)=>{
            const ai=ALL_AIS.find(a=>a.id===h.id);if(!ai)return null;
            const cat=CATEGORIES.find(c=>c.id===ai.catId);
            return(
              <div key={i} onClick={()=>onAI(ai)}
                style={{display:'flex',alignItems:'center',gap:14,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:11,padding:'12px 16px',cursor:'pointer',transition:'all 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=`${ai.color}44`;e.currentTarget.style.background='var(--surface3)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--surface2)';}}>
                <AILogo domain={ai.domain} name={ai.name} color={ai.color} size={38}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14,color:'#fff'}}>{ai.name}</div>
                  <div style={{fontSize:11,color:'var(--muted)'}}>{cat?.label} · {ai.desc}</div>
                </div>
                <div style={{fontSize:10,color:'var(--muted)',textAlign:'right'}}>
                  {new Date(h.ts).toLocaleDateString()}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


// ─── PERSONAL AI ──────────────────────────────────────────────────────────────

function PersonalAIScreen({profile}){
  const [messages,setMessages]=useState([
    {role:'assistant',content:`Hi ${profile?.name||'there'}! 👋 I'm your Personal AI. Ask me anything — I can help you find information, answer questions, summarize topics, or just have a conversation.`}
  ]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);
  const inputRef=useRef(null);

  useEffect(()=>{
    bottomRef.current?.scrollIntoView({behavior:'smooth'});
  },[messages]);

  const send=async()=>{
    const text=input.trim();
    if(!text||loading)return;
    setInput('');
    const newMessages=[...messages,{role:'user',content:text}];
    setMessages(newMessages);
    setLoading(true);
    try{
      const systemMsg={role:'system',content:`You are a helpful Personal AI assistant integrated into Neural Hub, an AI tools directory. The user's name is ${profile?.name||'Explorer'} and their role is ${profile?.role||'Everyone'}. Be concise, helpful and friendly.`};
      const allMessages=[systemMsg,...newMessages.map(m=>({role:m.role,content:m.content}))];
      const res=await fetch('https://jolly-boat-c87e.brurovall.workers.dev',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
        },
        body:JSON.stringify({
          messages:allMessages,
        }),
      });
      const data=await res.json();
      const reply=data.content?.[0]?.text||'Sorry, I could not get a response.';
      setMessages(prev=>[...prev,{role:'assistant',content:reply}]);
    }catch(e){
      setMessages(prev=>[...prev,{role:'assistant',content:'Sorry, there was an error. Please check your API key.'}]);
    }
    setLoading(false);
    setTimeout(()=>inputRef.current?.focus(),100);
  };

  const clearChat=()=>{
    setMessages([{role:'assistant',content:`Hi ${profile?.name||'there'}! 👋 I'm your Personal AI. Ask me anything!`}]);
  };

  const suggestions=[
    'What are the best AI tools for designers?',
    'Summarize the latest AI news',
    'How does GPT-4 compare to Claude?',
    'What AI tools help with video editing?',
  ];

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',height:'100vh'}}>
      {/* Header */}
      <div style={{padding:'20px 28px 16px',borderBottom:'1px solid var(--border)',background:'rgba(11,11,16,0.8)',backdropFilter:'blur(10px)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:10,letterSpacing:3,color:'var(--accent)',fontFamily:'Space Mono',marginBottom:4}}>PERSONAL AI</div>
            <h2 style={{fontSize:22,fontWeight:700,color:'#fff'}}>Your AI Assistant</h2>
          </div>
          <button onClick={clearChat}
            style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 14px',cursor:'pointer',color:'var(--muted)',fontFamily:'Space Grotesk',fontSize:12,transition:'all 0.2s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.color='var(--accent)';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--muted)';}}>
            ↺ Clear
          </button>
        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'20px 28px'}}>
        {messages.map((m,i)=>(
          <div key={i} style={{marginBottom:16,display:'flex',flexDirection:'column',alignItems:m.role==='user'?'flex-end':'flex-start'}}>
            <div style={{
              maxWidth:'75%',
              padding:'12px 16px',
              borderRadius:m.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px',
              background:m.role==='user'?'var(--accent2)':'var(--surface2)',
              border:m.role==='user'?'none':'1px solid var(--border)',
              color:'#fff',
              fontSize:14,
              lineHeight:1.6,
              whiteSpace:'pre-wrap',
              wordBreak:'break-word',
            }}>
              {m.content}
            </div>
            <div style={{fontSize:10,color:'var(--muted)',marginTop:4,padding:'0 4px'}}>
              {m.role==='user'?(profile?.name||'You'):'Neural AI'}
            </div>
          </div>
        ))}
        {loading&&(
          <div style={{display:'flex',alignItems:'flex-start',marginBottom:16}}>
            <div style={{padding:'12px 16px',borderRadius:'16px 16px 16px 4px',background:'var(--surface2)',border:'1px solid var(--border)'}}>
              <div style={{display:'flex',gap:4,alignItems:'center'}}>
                {[0,1,2].map(i=>(
                  <div key={i} style={{width:6,height:6,borderRadius:'50%',background:'var(--accent)',animation:'pulseDot 1.2s ease infinite',animationDelay:`${i*0.2}s`}}/>
                ))}
              </div>
            </div>
          </div>
        )}
        {/* Suggestions when only 1 message */}
        {messages.length===1&&(
          <div style={{marginTop:24}}>
            <div style={{fontSize:11,color:'var(--muted)',marginBottom:12,letterSpacing:1,fontFamily:'Space Mono'}}>SUGGESTED QUESTIONS</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {suggestions.map((s,i)=>(
                <button key={i} onClick={()=>{setInput(s);setTimeout(()=>inputRef.current?.focus(),50);}}
                  style={{padding:'12px 14px',borderRadius:10,border:'1px solid var(--border)',background:'var(--surface2)',color:'var(--muted)',fontSize:12,fontFamily:'Space Grotesk',cursor:'pointer',textAlign:'left',transition:'all 0.2s',lineHeight:1.4}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.color='#fff';}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--muted)';}}>
                  {s}
                </button>
              ))}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Input */}
      <div style={{padding:'16px 28px 24px',borderTop:'1px solid var(--border)',background:'rgba(11,11,16,0.8)',backdropFilter:'blur(10px)',flexShrink:0}}>
        <div style={{display:'flex',gap:10,alignItems:'flex-end'}}>
          <textarea
            ref={inputRef}
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder="Ask me anything... (Enter to send, Shift+Enter for new line)"
            rows={1}
            style={{flex:1,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 16px',color:'#fff',fontSize:14,fontFamily:'Space Grotesk',outline:'none',resize:'none',maxHeight:120,overflowY:'auto',lineHeight:1.5,transition:'border-color 0.2s'}}
            onFocus={e=>e.target.style.borderColor='var(--accent)'}
            onBlur={e=>e.target.style.borderColor='var(--border)'}
          />
          <button onClick={send} disabled={loading||!input.trim()}
            style={{padding:'12px 20px',borderRadius:12,border:'none',cursor:loading||!input.trim()?'default':'pointer',
              background:loading||!input.trim()?'var(--surface2)':'var(--accent2)',
              color:loading||!input.trim()?'var(--muted)':'#fff',
              fontSize:14,fontWeight:600,fontFamily:'Space Grotesk',transition:'all 0.2s',flexShrink:0}}>
            {loading?'...':'Send →'}
          </button>
        </div>
        <div style={{fontSize:10,color:'var(--muted)',marginTop:8,textAlign:'center',fontFamily:'Space Mono'}}>
          Powered by Claude · Neural Hub Personal AI
        </div>
      </div>
    </div>
  );
}

const FALLBACK=[
  {title:'GPT-5 Released with Real-Time Reasoning',summary:'OpenAI launches GPT-5 with improved reasoning, real-time voice, and a 2M context window.',category:'Models',source:'TechCrunch',date:'Apr 18, 2026',url:'https://techcrunch.com'},

  {title:'Stability AI Acquired by Adobe for $1.3B',summary:'Adobe acquires Stability AI, integrating Stable Diffusion across its entire Creative Cloud suite.',category:'Business',source:'Bloomberg',date:'Apr 10, 2026',url:'https://bloomberg.com'},
  {title:'AI Tutors Improve Student Grades by 38%',summary:'Stanford study across 50K students shows AI tutoring significantly outperforms classroom instruction.',category:'Research',source:'Nature',date:'Apr 9, 2026',url:'https://nature.com'},
];

function NewsScreen(){
  const [articles,setArticles]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [tries,setTries]=useState(0);

  const RSS_FEEDS=[
    'https://feeds.feedburner.com/TechCrunch',
    'https://www.theverge.com/rss/index.xml',
    'https://venturebeat.com/category/ai/feed/',
    'https://www.wired.com/feed/tag/artificial-intelligence/rss',
    'https://feeds.arstechnica.com/arstechnica/index',
  ];

  const PROXY='https://api.rss2json.com/v1/api.json?rss_url=';
  const AI_KEYWORDS=['AI','artificial intelligence','GPT','LLM','machine learning','OpenAI','Anthropic','Google AI','DeepMind','chatbot','neural','Gemini','Claude','ChatGPT','Llama','generative'];

  const catFromTitle=(t)=>{
    const tl=t.toLowerCase();
    if(/gpt|llama|gemini|claude|model|release|launch/.test(tl))return'Models';
    if(/fund|acqui|invest|valuat|billion|deal/.test(tl))return'Business';
    if(/law|regulat|policy|ban|eu|govern|act/.test(tl))return'Policy';
    if(/research|study|paper|breakthrough|discover/.test(tl))return'Research';
    return'Tools';
  };

  const fetchFeed=async(url)=>{
    const res=await fetch(PROXY+encodeURIComponent(url));
    const data=await res.json();
    if(!data.items)return[];
    return data.items
      .filter(item=>AI_KEYWORDS.some(k=>(item.title+' '+(item.description||'')).toLowerCase().includes(k.toLowerCase())))
      .slice(0,4)
      .map(item=>({
        title:item.title,
        summary:(item.description||'').replace(/<[^>]+>/g,'').slice(0,160)+'...',
        category:catFromTitle(item.title),
        source:data.feed?.title||new URL(url).hostname,
        date:item.pubDate?new Date(item.pubDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'Recent',
        url:item.link||'#',
      }));
  };

  useEffect(()=>{
    let cancelled=false;
    setLoading(true);
    setError(null);
    (async()=>{
      try{
        const results=await Promise.allSettled(RSS_FEEDS.map(f=>fetchFeed(f)));
        if(cancelled)return;
        const all=results
          .filter(r=>r.status==='fulfilled')
          .flatMap(r=>r.value)
          .filter((a,i,arr)=>arr.findIndex(b=>b.title===a.title)===i)
          .sort(()=>Math.random()-0.5)
          .slice(0,12);
        if(all.length>0){setArticles(all);}
        else{setArticles(FALLBACK);}
      }catch(e){
        if(!cancelled){setArticles(FALLBACK);setError('Using cached news');}
      }
      if(!cancelled)setLoading(false);
    })();
    return()=>{cancelled=true;};
  },[tries]);

  return(
    <div style={{flex:1,overflowY:'auto',padding:'26px 28px'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:24,flexWrap:'wrap',gap:10}} className="fade-up">
        <div>
          <div style={{fontSize:9,letterSpacing:4,color:'var(--accent)',marginBottom:6,fontFamily:'Space Mono'}}>LIVE DIGEST</div>
          <h2 style={{fontSize:40,fontWeight:700,color:'#fff',marginBottom:4}}>AI News</h2>
          <p style={{color:'var(--muted)',fontSize:13}}>What's happening in AI right now</p>
        </div>
        <button onClick={()=>setTries(t=>t+1)}
          style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 14px',cursor:'pointer',color:'var(--muted)',fontFamily:'Space Grotesk',fontSize:12,display:'flex',alignItems:'center',gap:6,transition:'all 0.2s',marginTop:4}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.color='var(--accent)';}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--muted)';}}>
          <span style={loading?{display:'inline-block',animation:'spin 1s linear infinite'}:{}}>{loading?'↺':'↺'}</span> Refresh
        </button>
      </div>
      <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:18}}>
        {Object.entries(CAT_NEWS).map(([cat,col])=>(
          <span key={cat} style={{fontSize:9,padding:'3px 9px',borderRadius:20,fontWeight:700,letterSpacing:0.5,background:`${col}15`,color:col,border:`1px solid ${col}30`}}>{cat.toUpperCase()}</span>
        ))}
      </div>
      {loading?(
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,padding:60}}>
          <div style={{width:28,height:28,border:'3px solid var(--border)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
          <div style={{color:'var(--muted)',fontSize:13}}>Loading AI news...</div>
        </div>
      ):(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:11}}>
          {articles.map((a,i)=>(
            <a key={i} href={a.url||'#'} target="_blank" rel="noopener"
              style={{textDecoration:'none',display:'block',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:11,overflow:'hidden',transition:'all 0.2s'}}
              className="fade-up"
              onMouseEnter={e=>{e.currentTarget.style.borderColor=`${CAT_NEWS[a.category]||'var(--accent)'}50`;e.currentTarget.style.transform='translateY(-2px)';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.transform='translateY(0)';}}>
              <div style={{height:3,background:CAT_NEWS[a.category]||'var(--accent)'}}/>
              <div style={{padding:'13px 15px'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                  <span style={{fontSize:8,padding:'2px 7px',borderRadius:20,fontWeight:700,letterSpacing:0.5,background:`${CAT_NEWS[a.category]||'var(--accent)'}18`,color:CAT_NEWS[a.category]||'var(--accent)',border:`1px solid ${CAT_NEWS[a.category]||'var(--accent)'}30`}}>{(a.category||'NEWS').toUpperCase()}</span>
                  <span style={{fontSize:10,color:'var(--muted)'}}>{a.date}</span>
                </div>
                <div style={{fontWeight:700,fontSize:13,color:'#fff',lineHeight:1.35,marginBottom:6}}>{a.title}</div>
                <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.55,marginBottom:9}}>{a.summary}</div>
                <div style={{fontSize:10,color:'rgba(255,255,255,0.18)',display:'flex',justifyContent:'space-between'}}>
                  <span>{a.source}</span>
                  <span style={{color:'var(--accent)'}}>Read →</span>
                </div>
              </div>
            </a>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [profile,setProfileState]=useState(getProfile());
  const [screen,setScreen]=useState('home');
  const [selCat,setSelCat]=useState(null);
  const [selAI,setSelAI]=useState(null);
  const [selAICat,setSelAICat]=useState(null);

  const goAI=useCallback(ai=>{
    const cat=CATEGORIES.find(c=>c.id===ai.catId)||CATEGORIES.find(c=>c.ais.some(a=>a.id===ai.id));
    if(!cat)return;
    addHistory({...ai,catId:ai.catId||cat.id});
    setSelAI(ai);setSelAICat(cat);setSelCat(cat);setScreen('detail');
  },[]);

  const goCategory=useCallback(cat=>{setSelCat(cat);setScreen('category');},[]);

  if(!profile){
    return <AuthScreen onDone={p=>{setProfileState(p);setProfile(p);}}/>;
  }

  return(
    <div style={{height:'100vh',width:'100vw',display:'flex',overflow:'hidden'}}>
      <Sidebar screen={screen} onScreen={s=>setScreen(s)} onCategory={goCategory} currentCatId={selCat?.id} onAI={goAI} profile={profile}/>
      <div style={{flex:1,width:0,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {screen==='home'&&<HomeScreen onCategory={goCategory} onAI={goAI} profile={profile}/>}
        {screen==='category'&&selCat&&<CategoryScreen category={selCat} onAI={(ai,cat)=>{addHistory({...ai,catId:cat.id});setSelAI(ai);setSelAICat(cat);setScreen('detail');}}/>}
        {screen==='detail'&&selAI&&<AIDetailScreen ai={selAI} category={selAICat} onLaunch={()=>setScreen('workspace')} onAI={goAI}/>}
        {screen==='workspace'&&selAI&&<WorkspaceScreen ai={selAI} category={selAICat} onBack={()=>setScreen('detail')}/>}
        {screen==='news'&&<NewsScreen/>}
        {screen==='personal'&&<PersonalAIScreen profile={profile}/>}
        {screen==='history'&&<HistoryScreen onAI={goAI}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
